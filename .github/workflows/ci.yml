name: CI / E2E Tests

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 50
        continue-on-error: true

      - name: Type check & Build
        run: npm run build

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Create .env.test
        run: |
          cat > .env.test << 'EOF'
          E2E_MEMBER_NICKNAME=${{ secrets.E2E_MEMBER_NICKNAME }}
          E2E_MEMBER_PASSWORD=${{ secrets.E2E_MEMBER_PASSWORD }}
          E2E_ADMIN_NICKNAME=${{ secrets.E2E_ADMIN_NICKNAME }}
          E2E_ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PENDING_NICKNAME=${{ secrets.E2E_PENDING_NICKNAME }}
          E2E_PENDING_PASSWORD=${{ secrets.E2E_PENDING_PASSWORD }}
          E2E_WITHDRAWN_NICKNAME=${{ secrets.E2E_WITHDRAWN_NICKNAME }}
          E2E_WITHDRAWN_PASSWORD=${{ secrets.E2E_WITHDRAWN_PASSWORD }}
          EOF

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
