<script>
  let currentUser = null;
  let isAutoLogin = false;
  let selectedFile = null;
  let regProfileFile = null;
  let editProfileFile = null;

  let targetRejectRow = null;
  let targetRejectCol = null;
  let selectedExemptDates = [];
  let allGalleryPhotos = [];

  let currentWeekData = {};
  let nextWeekData = {};
  let currentStartDateObj = new Date(); // 현재 주 시작일 저장용
  let showingWeek = 'this';

  const GUIDE_KEY = 'SME_SHOW_GUIDE_V8';
  const ADMIN_GUIDE_KEY = 'SME_ADMIN_GUIDE_V2';
  let currentTutoType = 'user';

  let animationInterval1 = null;
  let animationInterval2 = null;
  let tooltipTimeout = null;
  let chatHistory = [];

  let cheerList = [];
  let cheerIndex = 0;
  let cheerInterval = null;
  let currentPhotoIndex = -1;

  function showSysModal(title, msg, type, callback) {
    document.getElementById('sysTitle').innerText = title;
    document.getElementById('sysMsg').innerText = msg;
    const btnGroup = document.getElementById('sysBtnGroup');
    btnGroup.innerHTML = '';
    if (type === 'confirm') {
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'btn btn-secondary';
      cancelBtn.innerText = '취소';
      cancelBtn.onclick = () => closeModal('sysModal');
      const okBtn = document.createElement('button');
      okBtn.className = 'btn btn-primary';
      okBtn.innerText = '확인';
      okBtn.onclick = () => {
        closeModal('sysModal');
        if (callback) callback();
      };
      btnGroup.appendChild(cancelBtn);
      btnGroup.appendChild(okBtn);
    } else {
      const okBtn = document.createElement('button');
      okBtn.className = 'btn btn-primary';
      okBtn.innerText = '확인';
      okBtn.onclick = () => closeModal('sysModal');
      btnGroup.appendChild(okBtn);
    }
    document.getElementById('sysModal').style.display = 'flex';
  }

  function showAlert(msg) {
    showSysModal('알림', msg, 'alert');
  }

  function showConfirm(msg, yesCallback) {
    showSysModal('확인', msg, 'confirm', yesCallback);
  }

  function closeModal(id) {
    document.getElementById(id).style.display = 'none';
  }

  function setCookie(name, value, days) {
    try {
      let expires = "";
      if (days) {
        const date = new Date();
        // 365일 뒤 만료
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toUTCString();
      }
      // [수정] SameSite=None; Secure 속성 필수 (아이폰 iframe 허용)
      document.cookie = name + "=" + (value || "") + expires + "; path=/; SameSite=None; Secure";
    } catch (e) {
      console.log("Cookie error");
    }
  }

  function getCookie(name) {
    const nameEQ = name + "=";
    const ca = document.cookie.split(';');
    for (let i = 0; i < ca.length; i++) {
      let c = ca[i];
      while (c.charAt(0) === ' ') c = c.substring(1, c.length);
      if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
    }
    return null;
  }

  function eraseCookie(name) {
    document.cookie = name + '=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT; SameSite=None; Secure';
  }

  window.onload = function() {
    loadSavedTheme();
    
    // ❌ [삭제됨] 아래 두 줄이 범인이었습니다! 이제 지웠으니 순서가 저장됩니다.
    // localStorage.removeItem('SME_MENU_ORDER');
    // localStorage.removeItem('SME_ADMIN_ORDER');

    let saved = null;

    // 1. 쿠키를 먼저 시도
    try {
      const cookieSaved = getCookie('SME_USER');
      if (cookieSaved) saved = decodeURIComponent(cookieSaved);
    } catch (e) {}

    // 2. 로컬 스토리지 시도
    if (!saved) {
      try {
        saved = localStorage.getItem('SME_USER');
      } catch (e) {}
    }

    if (saved) {
      try {
        const user = JSON.parse(saved);
        if (user.auto || (user.nick && user.pw)) {
          document.getElementById('loginId').value = user.nick;
          document.getElementById('loginPw').value = user.pw;

          isAutoLogin = true;
          document.getElementById('autoLoginCheck').classList.add('active');

          document.getElementById('dashboardScreen').style.display = 'none';
          document.getElementById('loginScreen').style.display = 'none';
          showLoad(`${user.nick}님, 자동 접속 중...`);

          tryLogin(true);
        } else {
          showLoginScreen();
        }
      } catch (e) {
        localStorage.removeItem('SME_USER');
        eraseCookie('SME_USER');
        showLoginScreen();
      }
    } else {
      showLoginScreen();
    }

    setTodayInSelect();
    startLoginTextAnimation();
    enableSwipeGestures();
    enablePullToRefresh();
    
    // 메뉴 드래그 기능 활성화
    initMenuSortable();
  };

  function createRollingInterval(elementId, words) {
    let wordIndex = 0;
    const span = document.getElementById(elementId);

    return setInterval(() => {
      if (span) {
        span.classList.add('slide-out');

        setTimeout(() => {
          wordIndex = (wordIndex + 1) % words.length;
          span.innerText = words[wordIndex];

          span.classList.remove('slide-out');
          span.classList.add('slide-ready');

          setTimeout(() => {
            span.classList.remove('slide-ready');
          }, 50);

        }, 500);
      }
    }, 2500);
  }

  function startLoginTextAnimation() {
    const words = ["득근", "행복", "건강", "안전", "SME", "돌콩"];
    if (animationInterval1) clearInterval(animationInterval1);
    animationInterval1 = createRollingInterval('changingText', words);
  }

  function startGreetingAnimation() {
    const words = ["SME", "심만운", "득근해", "웃자", "행복해", "신나게", "활기차게", "행운이", "화이팅", "돌콩해"];
    if (animationInterval2) clearInterval(animationInterval2);
    animationInterval2 = createRollingInterval('changingGreeting', words);
  }

  function playNewWeekAnimation(newTitle) {
    const overlay = document.getElementById('newWeekOverlay');
    const content = document.getElementById('newWeekContent');
    const titleEl = document.getElementById('newWeekTitleLarge');

    titleEl.innerText = newTitle;
    overlay.style.display = 'flex';

    setTimeout(() => {
      content.classList.add('minimize-to-badge');
      overlay.style.background = 'rgba(255,255,255,0)';

      setTimeout(() => {
        overlay.style.display = 'none';
        content.classList.remove('minimize-to-badge');
        overlay.style.background = 'rgba(255,255,255,0.95)';
      }, 800);
    }, 2000);
  }

  function showLoginScreen() {
    document.getElementById('dashboardScreen').style.display = 'none';
    const login = document.getElementById('loginScreen');
    login.style.display = 'flex';
    document.getElementById('adminWatermark').classList.remove('active');
  }

  function setTodayInSelect() {
    const days = ['일', '월', '화', '수', '목', '금', '토'];
    const d = days[new Date().getDay()];
    // 기존 select box 제어 코드 삭제하고 아래 한 줄로 대체
    selectDay(d, true);
  }

  function toggleCheckbox() {
    isAutoLogin = !isAutoLogin;
    const el = document.getElementById('autoLoginCheck');
    if (isAutoLogin) el.classList.add('active');
    else el.classList.remove('active');
  }

  function tryLogin(isAuto = false) {
    const nick = document.getElementById('loginId').value;
    const pw = document.getElementById('loginPw').value;

    if (!nick || !pw) {
      if (isAuto) showLoginScreen();
      else showAlert('정보를 입력해주세요');
      hideLoad();
      return;
    }

    if (!isAuto) showLoad('로그인 중...');

    google.script.run.withSuccessHandler(res => {
      // 1. 로그인 성공 (SUCCESS)
      if (res.status === 'SUCCESS') {
        currentUser = nick;
        const userData = {
          nick: nick,
          pw: pw,
          auto: isAutoLogin || isAuto,
          isAdmin: res.isAdmin,
          isTest: res.isTest
        };

        if (res.isAdmin) {
          showLoad('⚠️ 관리자 권한으로 접속 중');
          const msgEl = document.getElementById('loadMsg');
          if(msgEl) msgEl.style.color = "#FF3B30";
          
          setTimeout(() => {
             finishLogin(isAuto, userData, res.isAdmin, res.preloadedData);
          }, 1000);
        } else if (res.isTest) {
          showLoad('🧪 테스트 계정 접속...');
          const msgEl = document.getElementById('loadMsg');
          if(msgEl) msgEl.style.color = "#3182F6";
          
          setTimeout(() => {
            hideLoad();
            if (isAuto) {
              finishLogin(isAuto, userData, res.isAdmin, res.preloadedData);
            } else {
              showConfirm('[테스트 계정] 접속하시겠습니까?', 
                () => finishLogin(isAuto, userData, res.isAdmin, res.preloadedData)
              );
            }
          }, 500);
        } else {
          // 일반 사용자
          finishLogin(isAuto, userData, res.isAdmin, res.preloadedData);
        }
      }
      // 2. 승인 대기 중 (PENDING_APPROVAL)
      else if (res.status === 'PENDING_APPROVAL') {
        hideLoad();
        localStorage.removeItem('SME_USER'); 
        eraseCookie('SME_USER');
        showAlert('⏳ 가입 승인 대기 중입니다.\n관리자가 승인하면 로그인할 수 있습니다.'); 
      }
      // 3. 비밀번호 틀림 (WRONG_PW)
      else if (res.status === 'WRONG_PW') {
        hideLoad();
        localStorage.removeItem('SME_USER');
        eraseCookie('SME_USER');
        if (isAuto) {
          showAlert('비밀번호가 변경되었습니다. 다시 로그인해주세요.');
          showLoginScreen();
        } else {
          showAlert('비밀번호가 틀렸습니다.');
        }
      }
      else if (res.status === 'WITHDRAWN') {
        hideLoad();
        localStorage.removeItem('SME_USER');
        eraseCookie('SME_USER');
        showAlert('탈퇴 처리된 계정입니다.\n재가입은 관리자에게 문의하세요.');
      }
      // 4. 사용자 없음 (NOT_FOUND)
      else {
        hideLoad();
        localStorage.removeItem('SME_USER');
        eraseCookie('SME_USER');
        if (isAuto) showLoginScreen();
        else showAlert('가입되지 않은 회원입니다.');
      }
    }).withFailureHandler(e => {
      hideLoad();
      if (isAuto) {
        showLoginScreen();
      } else {
        showAlert('접속 오류: 인터넷 연결을 확인해주세요.');
      }
    }).checkUser(nick, pw);
  }

  function finishLogin(isAuto, userData, isAdmin, preloadedData) {
    if (isAutoLogin || isAuto) {
      const jsonStr = JSON.stringify(userData);
      try { localStorage.setItem('SME_USER', jsonStr); } catch (e) {}
      setCookie('SME_USER', encodeURIComponent(jsonStr), 365);
    } else {
      localStorage.removeItem('SME_USER');
      eraseCookie('SME_USER');
    }
    // [핵심] 데이터를 들고 대시보드로 이동!
    loadDashboard(isAdmin, preloadedData);
  }

  function loadDashboard(isAdmin, preloadedData) {
    if (isAdmin === undefined) {
        let saved = localStorage.getItem('SME_USER');
        if (!saved) {
            const cookieSaved = getCookie('SME_USER');
            if (cookieSaved) saved = decodeURIComponent(cookieSaved);
        }
        const parsed = JSON.parse(saved || '{}');
        isAdmin = parsed.isAdmin;
    }

    const saved = JSON.parse(localStorage.getItem('SME_USER') || '{}');
    saved.isAdmin = isAdmin;
    const jsonStr = JSON.stringify(saved);
    localStorage.setItem('SME_USER', jsonStr);
    setCookie('SME_USER', encodeURIComponent(jsonStr), 365);

    showLoad('데이터 불러오는 중...');
    const msgEl = document.getElementById('loadMsg');
    if (msgEl) msgEl.style.color = "#555";

    const renderScreen = function(data) {
        if (!data) {
            hideLoad();
            showAlert("데이터를 불러오지 못했습니다.");
            return;
        }

        hideLoad();
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboardScreen').style.display = 'block';
        
        document.getElementById('userName').innerText = data.nickname;
        document.getElementById('weekBadge').innerText = data.weekTitle;
        document.getElementById('uCount').innerText = data.totalCount;

        const fineAmount = parseInt(data.fine);
        const fineEl = document.getElementById('uFine');
        fineEl.innerText = fineAmount.toLocaleString() + '원';
        if (fineAmount === 0) fineEl.style.color = '#3182F6';
        else if (fineAmount <= 2000) fineEl.style.color = '#FF9500';
        else fineEl.style.color = '#FF3B30';

        // ⭐⭐⭐ [핵심 수정] 여기가 바뀌어야 합니다! ⭐⭐⭐
        // 사진이 있으면 -> 사진 ON / 아이콘 OFF
        // 사진이 없으면 -> 사진 OFF / 아이콘 ON
        const dashImg = document.getElementById('dashProfileImg');
        const menuImg = document.getElementById('menuProfileImg');
        const menuDef = document.getElementById('menuDefaultIcon'); // 기본 아이콘 요소
        const editPreview = document.getElementById('editProfilePreview');
        
        if (data.profileUrl) {
            if(dashImg) { dashImg.src = data.profileUrl; dashImg.style.display = 'block'; }
            
            // 메뉴 쪽 처리
            if(menuImg) { menuImg.src = data.profileUrl; menuImg.style.display = 'block'; }
            if(menuDef) { menuDef.style.display = 'none'; } // ★ 아이콘 숨김

            if(editPreview) { editPreview.src = data.profileUrl; editPreview.style.display = 'block'; }
        } else {
            if(dashImg) { dashImg.style.display = 'none'; }
            
            // 메뉴 쪽 처리
            if(menuImg) { menuImg.style.display = 'none'; }
            if(menuDef) { menuDef.style.display = 'flex'; } // ★ 아이콘 보임 (flex로 중앙정렬)

            if(editPreview) { editPreview.style.display = 'none'; }
        }
        // ⭐⭐⭐ 수정 끝 ⭐⭐⭐

        const challengeBtn = document.getElementById('headerChallengeBtn');
        if (data.activeChallengeCount > 0) {
            challengeBtn.style.display = 'flex';
            challengeBtn.innerHTML = `<span>🏃🏻‍➡️ SME 챌린지</span>`;
        } else {
            challengeBtn.style.display = 'none';
        }

        if (data.notice) {
            const banner = document.getElementById('noticeBanner');
            banner.style.display = 'flex';
            const prevHtml = `
              <div style="display:flex; align-items:center; width:100%;">
                  <div class="notice-icon" style="margin-right:10px;">📢</div>
                  <div style="flex:1; overflow:hidden;">
                      <div style="display:flex; align-items:center;">
                          <span id="noticeBadge" class="new-badge">N</span>
                          <div id="noticeTextContent" class="notice-text-wrapper"></div>
                      </div>
                      <div id="noticeWriter" class="notice-writer"></div>
                  </div>
                  <div id="noticeArrow" class="notice-arrow">▼</div>
              </div>`;
            banner.innerHTML = prevHtml;
            document.getElementById('noticeTextContent').innerHTML = linkify(data.notice.content);
            document.getElementById('noticeWriter').innerText = `from. ${data.notice.writer}`;

            const lastNotice = localStorage.getItem('SME_LAST_NOTICE');
            const currentNoticeHash = data.notice.content + data.notice.writer;
            if (lastNotice !== currentNoticeHash) {
                document.getElementById('noticeBadge').style.display = 'inline-block';
                banner.setAttribute('data-new', 'true');
                banner.setAttribute('data-hash', currentNoticeHash);
            } else {
                document.getElementById('noticeBadge').style.display = 'none';
                banner.removeAttribute('data-new');
            }
            banner.onclick = function() { toggleNotice(this); };
        } else {
            document.getElementById('noticeBanner').style.display = 'none';
        }

        const badges = document.querySelectorAll('.admin-badge');
        badges.forEach(b => b.style.display = isAdmin ? 'inline-block' : 'none');
        
        // [수정됨] 관리자 뱃지 로직 (메인 메뉴 아이콘 뱃지 기능 복구)
        if (isAdmin) {
            document.getElementById('adminWatermark').classList.add('active');
            document.getElementById('adminMenuSection').style.display = 'block';
            
            let totalAlerts = 0;

            if (data.adminCounts) {
                const pCount = data.adminCounts.photos || 0; 
                const eCount = data.adminCounts.exempts || 0;
                const jCount = data.adminCounts.joins || 0;
                const fCount = data.adminCounts.fines || 0; // [신규] 미납 건수
                
                // 전체 알림 합계에 미납 건수도 포함
                totalAlerts = pCount + eCount + jCount + fCount;

                const bRev = document.getElementById('badgeReview');
                const bExe = document.getElementById('badgeExempt');
                const bJoin = document.getElementById('badgeJoin');
                const bFine = document.getElementById('badgeFine'); // [신규]
                
                if (pCount > 0) { bRev.innerText = pCount; bRev.style.display = 'block'; } else { bRev.style.display = 'none'; }
                if (eCount > 0) { bExe.innerText = eCount; bExe.style.display = 'block'; } else { bExe.style.display = 'none'; }
                if (jCount > 0) { bJoin.innerText = jCount; bJoin.style.display = 'block'; } else { bJoin.style.display = 'none'; }
                
                // [신규] 미납 뱃지 표시
                if (fCount > 0) { bFine.innerText = fCount; bFine.style.display = 'block'; } else { bFine.style.display = 'none'; }
            }
            
            // 헤더 통합 뱃지 & 메인 메뉴 버튼 뱃지 업데이트
            const headerBadge = document.getElementById('adminTotalBadge');
            const mainMenuBadge = document.getElementById('mainMenuBadge');
            
            if (totalAlerts > 0) {
                headerBadge.innerText = totalAlerts;
                headerBadge.style.display = 'inline-block';
                
                mainMenuBadge.innerText = totalAlerts;
                mainMenuBadge.style.display = 'block';
            } else {
                headerBadge.style.display = 'none';
                mainMenuBadge.style.display = 'none';
            }
            
        } else {
            // 관리자가 아닐 때
            document.getElementById('adminWatermark').classList.remove('active');
            document.getElementById('adminMenuSection').style.display = 'none';
            document.getElementById('mainMenuBadge').style.display = 'none';
        }
        
        if (data.isTest) {
            document.getElementById('testWatermark').classList.add('active');
            const badge = document.getElementById('menuUserBadge');
            badge.innerText = "TEST"; badge.style.background = "#8B95A1"; badge.style.display = "inline-block";
        } else {
            document.getElementById('testWatermark').classList.remove('active');
            if (!isAdmin) document.getElementById('menuUserBadge').style.display = 'none';
            else {
                document.getElementById('menuUserBadge').innerText = "ADMIN";
                document.getElementById('menuUserBadge').style.background = "var(--primary)";
            }
        }
        document.getElementById('menuUserName').innerText = data.nickname;

        const matches = String(data.weekTitle).match(/(\d+)년\s+(\d+)월.*\((\d+)일~(\d+)일\)/);
        if (matches) {
            const y = parseInt(matches[1]);
            const m = parseInt(matches[2]) - 1;
            const startDay = parseInt(matches[3]);
            const endDay = parseInt(matches[4]);

            // 시작일이 종료일보다 숫자가 크면(예: 30일~5일), 시작일은 이전 달(3월)로 계산
            let startMonth = m;
            if (startDay > endDay) {
                startMonth = m - 1;
            }
            currentStartDateObj = new Date(y, startMonth, startDay);
        }
        currentWeekData = data.weekData;
        nextWeekData = data.nextWeekData;
        showingWeek = 'this';
        renderCal(currentWeekData, currentStartDateObj);
        enableSwipeGestures();
        
        const daysMap = ['일', '월', '화', '수', '목', '금', '토'];
        const todayChar = daysMap[new Date().getDay()];
        selectDay(todayChar, true);
        
        const lastWeekTitle = localStorage.getItem('SME_LAST_WEEK');
        if (lastWeekTitle && lastWeekTitle !== data.weekTitle) {
            setTimeout(() => { playNewWeekAnimation(data.weekTitle); }, 300);
        }
        localStorage.setItem('SME_LAST_WEEK', data.weekTitle);

        const recapMenuBtn = document.querySelector('.menu-box[data-id="recap"]');
        if (recapMenuBtn) {
            recapMenuBtn.style.display = data.isRecapVisible ? 'flex' : 'none';
        }
        
        // 관리자용 버튼 아이콘(🔒/🔓) 업데이트
        if (isAdmin) {
            const recapToggleSwitch = document.getElementById('recapToggleSwitch');
            if (recapToggleSwitch) {
                recapToggleSwitch.checked = data.isRecapVisible;
            }
        }

        if (!data.tutoStatus.user) {
            currentTutoType = 'user'; setTimeout(confirmTutorial, 500);
        } else if (isAdmin && !data.tutoStatus.admin) {
            currentTutoType = 'admin'; setTimeout(confirmTutorial, 500);
        }
        startActivityTracking();
        refreshCheerData();
    };

    if (preloadedData) {
        console.log("🚀 Fast Loading with preloaded data");
        renderScreen(preloadedData);
    } else {
        console.log("🐌 Normal Loading from server");
        google.script.run.withSuccessHandler(data => {
            renderScreen(data);
        }).withFailureHandler(err => {
            hideLoad();
            showAlert("접속 오류: " + err);
        }).getUserStatus(currentUser);
    }

    google.script.run.withSuccessHandler(res => {
        if (res.hasNoti) {
            const isApprove = res.msg.includes('승인');
            showSysModal(isApprove ? '면제 신청 승인' : '면제 신청 반려', res.msg.replace('✅ 승인 알림', '').replace('🚫 반려 알림', '').trim());
            document.getElementById('sysIcon').innerText = isApprove ? '🎉' : '😥';
        }
    }).checkExemptionNoti(currentUser);
    
    google.script.run.withSuccessHandler(rankData => {
        const rankEl = document.getElementById('dashMyRank');
        if (rankEl) {
            if (rankData.myRank > 0) rankEl.innerText = rankData.myRank + "위";
            else rankEl.innerText = "-";
        }
    }).getWorkoutLeaderboard(currentUser);
    
    loadGalleryData();
    if (data.isRecapVisible) {
        checkRecapPrompt(data.tutoStatus.recap);
    }
  }

  function toggleWeekView(target) {
    const grid = document.getElementById('calGrid');
    const title = document.getElementById('calTitleText');

    // 이미 해당 뷰면 실행 안 함
    if ((target === 'next' && showingWeek === 'next') || (target === 'this' && showingWeek === 'this')) return;

    // 1. 사라지는 애니메이션
    if (target === 'next') {
      grid.classList.add('anim-slide-next-out');
    } else {
      grid.classList.add('anim-slide-prev-out');
    }

    // 2. 데이터 교체 및 나타나기
    setTimeout(() => {
      grid.classList.remove('anim-slide-next-out', 'anim-slide-prev-out');

      if (target === 'next') {
        showingWeek = 'next'; // [중요] 상태 변경
        title.innerText = '다음 주';

        const nextStartDate = new Date(currentStartDateObj);
        nextStartDate.setDate(currentStartDateObj.getDate() + 7);
        renderCal(nextWeekData, nextStartDate, true);

        grid.classList.add('anim-slide-next-in');
      } else {
        showingWeek = 'this'; // [중요] 상태 변경
        title.innerText = '이번 주';
        renderCal(currentWeekData, currentStartDateObj, false);

        grid.classList.add('anim-slide-prev-in');
      }

      // ========== [핵심 추가] 버튼 상태 강제 새로고침 ==========
      // 화면이 넘어가면, 현재 선택되어 있는 요일(예: 수요일)을 기준으로
      // 버튼을 잠글지 말지 다시 판단하게 시킵니다.
      const currentDayChar = document.getElementById('selectedDayValue').value;
      if (currentDayChar) {
        // selectDay 함수가 'showingWeek' 변수를 확인해서 버튼을 비활성화해줍니다.
        selectDay(currentDayChar, true);
      }
      // =====================================================

      setTimeout(() => {
        grid.classList.remove('anim-slide-next-in', 'anim-slide-prev-in');
      }, 200);

    }, 200);
  }

  function renderExemptCalendar() {
    const thisWeekDiv = document.getElementById('exemptThisWeek');
    const nextWeekDiv = document.getElementById('exemptNextWeek');
    thisWeekDiv.innerHTML = '';
    nextWeekDiv.innerHTML = '';

    // 이번주 월요일 기준 (오늘 요일 구해서 역산)
    const today = new Date();
    const day = today.getDay();
    const diff = today.getDate() - day + (day == 0 ? -6 : 1);
    const thisMon = new Date(today);
    thisMon.setDate(diff);

    for (let i = 0; i < 14; i++) {
      const d = new Date(thisMon);
      d.setDate(thisMon.getDate() + i);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const dateStr = `${yyyy}-${mm}-${dd}`;

      const el = document.createElement('div');
      el.className = 'exempt-day';
      el.innerText = d.getDate();
      el.onclick = () => toggleExemptDate(el, dateStr);

      if (i < 7) thisWeekDiv.appendChild(el);
      else nextWeekDiv.appendChild(el);
    }
  }

  function toggleExemptDate(el, dateStr) {
    if (selectedExemptDates.includes(dateStr)) {
      selectedExemptDates = selectedExemptDates.filter(d => d !== dateStr);
      el.classList.remove('selected');
    } else {
      selectedExemptDates.push(dateStr);

    const cnt = selectedExemptDates.length;
    document.getElementById('exemptCountMsg').innerText = cnt > 0 ? `${cnt}일 면제 신청` : '날짜를 선택해주세요';

  // [수정] 캘린더 렌더링 (날짜 숫자 표시 강화)
  function renderCal(weekData, startDate, isNextWeekMode = false) {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const days = ['월', '화', '수', '목', '금', '토', '일'];

    // 1. 오늘 요일 인덱스 (0:월 ~ 6:일)
    const jsDay = new Date().getDay();
    const todayIdx = (jsDay === 0) ? 6 : jsDay - 1;

    const currentSelectedDay = document.getElementById('selectedDayValue').value;

    days.forEach((d, idx) => {
      const item = weekData[d] || {
        status: 'NONE'
      };
      const div = document.createElement('div');

      // 날짜 표시용
      const cellDate = new Date(startDate);
      cellDate.setDate(startDate.getDate() + idx);
      const dateDisplay = cellDate.getDate();

      // 상태값 존재 여부 (완료/반려/면제 등이 있으면 무조건 보여줌)
      const hasStatus = (item.status === 'DONE' || item.status === 'REJECT' || item.status === 'EXEMPT');

      // [핵심 로직 수정] 
      // "활성화(클릭 가능)"가 되는 조건 2가지
      // 조건 1. (이번 주 모드이면서) AND (오늘을 포함한 과거 요일)
      // 조건 2. OR (상태값이 이미 있는 경우 - 예: 미리 면제 신청한 날)
      const isPastOrToday = (!isNextWeekMode && idx <= todayIdx);
      const isActive = isPastOrToday || hasStatus;

      let extraClass = '';
      if (item.status === 'DONE') extraClass = 'done';
      else if (item.status === 'REJECT') extraClass = 'rejected';
      else if (item.status === 'PENDING') extraClass = 'pending';
      else if (item.status === 'EXEMPT') extraClass = 'exempt';

      // 활성화 조건이 아니면(즉, 미래거나 다음주면) -> 비활성화(점선) 처리
      if (!isActive) {
        extraClass += ' disabled';
      }

      div.className = `day-item ${extraClass}`;

      // [오늘 표시] - 이번 주 모드일 때만
      if (!isNextWeekMode && idx === todayIdx) {
        div.classList.add('today');
        if (!currentSelectedDay || currentSelectedDay === d) {
          div.classList.add('selected');
          if (!currentSelectedDay) {
            document.getElementById('selectedDayValue').value = d;
            document.getElementById('daySelectText').innerText = d + "요일";
            setTimeout(() => selectDay(d, true), 0);
          }
        }
      }
      // [선택됨 표시]
      else if (!isNextWeekMode && d === currentSelectedDay) {
        div.classList.add('selected');
      }

      // HTML 구성
      let innerHTML = `<div style="font-size:12px; font-weight:bold; opacity:0.6;">${d}</div><div class="day-date">${dateDisplay}</div>`;

      if (item.status === 'DONE') innerHTML += `<div style="font-size:16px;">✅</div>`;
      else if (item.status === 'REJECT') innerHTML += `<div style="font-size:16px;">❌</div>`;
      else if (item.status === 'PENDING') innerHTML += `<div style="font-size:16px;">⏳</div>`;
      else if (item.status === 'EXEMPT') innerHTML += `<div style="font-size:16px;">⭐</div>`;

      div.innerHTML = innerHTML;

      // 클릭 이벤트 연결 (비활성화 상태가 아닐 때만)
      if (!div.classList.contains('disabled')) {
        div.onclick = function() {
          // UI 갱신
          document.querySelectorAll('.day-item').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');

          // 데이터 선택
          selectDay(d, true);

          // 말풍선 메시지
          let tooltipMsg = "";
          if (item.status === 'REJECT') tooltipMsg = `[반려] ${item.rejectMsg}`;
          else if (item.status === 'PENDING') tooltipMsg = "관리자 검토 중입니다";
          else if (item.status === 'EXEMPT') tooltipMsg = "면제 승인된 날입니다";
          else if (item.status === 'DONE') tooltipMsg = "인증 완료!";

          if (tooltipMsg) {
            const bubble = document.getElementById('globalTooltip');
            const rect = div.getBoundingClientRect();
            bubble.innerText = tooltipMsg;
            bubble.style.left = (rect.left + (rect.width / 2)) + 'px';
            bubble.style.top = rect.top + 'px';
            bubble.classList.add('show');
            if (tooltipTimeout) clearTimeout(tooltipTimeout);
            tooltipTimeout = setTimeout(() => {
              bubble.classList.remove('show');
            }, 2000);
          }
        };
      }

      grid.appendChild(div);
    });
  }

  function handleFileSelect(input) {
    if (input.files && input.files[0]) {

      // [추가된 부분] 파일이 선택되면 메시지를 띄웁니다 (2초간)
      const notice = document.getElementById('timestampNotice');
      // 메시지 내용을 살짝 바꿔주면 더 자연스럽습니다
      notice.innerHTML = "사진에 타임스탬프를<br>기록하고 있습니다...";
      notice.classList.add('show');

      // 2초 뒤에 메시지 사라짐
      setTimeout(() => {
        notice.classList.remove('show');
      }, 3000);
      // [추가된 부분 끝]

      const file = input.files[0];
      const reader = new FileReader();

      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);

          // 데이터 준비
          const now = new Date();
          const timestamp = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
          const authMark = "SME OFFICIAL VERIFIED | SME 서버에 저장됨";

          // 스타일 설정
          const fontSize = Math.floor(canvas.width / 28);
          const margin = fontSize * 0.8;
          const padding = fontSize * 0.4;

          ctx.font = `bold ${fontSize}px sans-serif`;
          const timeWidth = ctx.measureText(timestamp).width;
          ctx.font = `bold ${fontSize * 0.6}px sans-serif`;
          const authWidth = ctx.measureText(authMark).width;

          const boxWidth = Math.max(timeWidth, authWidth) + (padding * 2);
          const boxHeight = (fontSize * 2.2) + (padding * 2);
          const boxX = canvas.width - boxWidth - margin;
          const boxY = canvas.height - boxHeight - margin;

          // 배경 박스 및 텍스트 그리기
          ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
          ctx.fillRect(boxX, boxY, boxWidth, boxHeight);

          ctx.fillStyle = "#4992FF";
          ctx.font = `bold ${fontSize * 0.6}px sans-serif`;
          ctx.fillText(authMark, boxX + padding, boxY + padding + (fontSize * 0.6));

          ctx.fillStyle = "white";
          ctx.font = `bold ${fontSize}px sans-serif`;
          ctx.fillText(timestamp, boxX + padding, boxY + padding + (fontSize * 1.8));

          selectedFile = canvas.toDataURL('image/jpeg', 0.8);
          document.getElementById('miniPreviewImg').src = selectedFile;
          document.getElementById('previewContainer').style.display = 'flex';
          document.getElementById('postInputWrapper').style.display = 'block';
          document.getElementById('selectPhotoBtn').style.display = 'none';
          document.getElementById('uploadBtn').style.display = 'flex';
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  }

  function openLedger() {
    closeMenu();
    showLoad('장부 불러오는 중...');

    // 1. 관리자 확인
    let isAdmin = false;
    try {
        const saved = JSON.parse(localStorage.getItem('SME_USER') || '{}');
        if (saved.isAdmin) isAdmin = true;
    } catch(e) {}

    // 2. 관리자 버튼 UI 제어
    const adminControls = document.getElementById('adminLedgerControls');
    if (isAdmin) {
        adminControls.style.display = 'block';
    } else {
        adminControls.style.display = 'none';
    }

    // 3. 데이터 로드
    google.script.run.withSuccessHandler(history => {
      hideLoad();
      
      document.getElementById('dashboardScreen').style.display = 'none';
      document.getElementById('ledgerScreen').style.display = 'block';
      window.scrollTo(0, 0);

      const tbody = document.getElementById('ledgerBody');
      tbody.innerHTML = '';
      
      // 삭제 버튼 열 표시/숨김
      const thDel = document.querySelector('.admin-del-col');
      if (thDel) thDel.style.display = isAdmin ? 'table-cell' : 'none';

      if (history.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:#888;">거래 내역이 없습니다.</td></tr>';
        document.getElementById('ledgerTotalBalance').innerText = "0원";
      } else {
        const hasNum = (str) => /\d/.test(str);
        const parseMoney = (val) => parseInt(String(val).replace(/,/g, '')) || 0;

        // 최신 잔액 계산
        const lastItem = history[history.length - 1];
        const currentTotal = parseMoney(lastItem.balance);
        document.getElementById('ledgerTotalBalance').innerText = currentTotal.toLocaleString() + "원";

        // 최신순 정렬
        history.reverse();

        history.forEach((row) => {
          let amtClass = '';
          let amtDisplay = '';

          // [핵심] 수입/지출에 따라 클래스(in/out) 부여
          if (hasNum(row.income)) {
            amtClass = 'in'; // 파란색 클래스
            amtDisplay = '+' + parseMoney(row.income).toLocaleString();
          } else if (hasNum(row.expense)) {
            amtClass = 'out'; // 빨간색 클래스
            amtDisplay = '-' + parseMoney(row.expense).toLocaleString();
          }

          const balanceStr = row.balance ? parseMoney(row.balance).toLocaleString() : '-';
          const tr = document.createElement('tr');
          
          // 삭제 버튼 (관리자용)
          const delBtnHtml = isAdmin ? 
            `<td class="l-td l-del">
               <span onclick="doDeleteTrans(${row.rowNum})">❌</span>
             </td>` : '';

          tr.innerHTML = `
                <td class="l-td">
                    <div class="l-date">${row.date}</div>
                    <div class="l-desc">${row.desc}</div>
                </td>
                <td class="l-td l-who">
                    ${row.who}
                </td>
                <td class="l-td l-amt ${amtClass}">
                    ${amtDisplay}
                </td>
                <td class="l-td l-bal">
                    ${balanceStr}
                </td>
                ${delBtnHtml}
            `;
          tbody.appendChild(tr);
        });
      }
    }).getTransactionHistory();
  }

  function renderPastCal(data) {
    const grid = document.getElementById('pastCalGrid');
    grid.innerHTML = '';
    const days = ['월', '화', '수', '목', '금', '토', '일'];

    days.forEach(d => {
      const status = data[d];
      const div = document.createElement('div');
      div.className = 'past-day-item';

      let icon = '';
      let text = d;

      if (status === 'DONE') {
        div.classList.add('done');
        icon = '✅';
      } else if (status === 'EXEMPT') {
        div.classList.add('exempt');
        icon = '⭐';
      } else {
        // NONE, REJECT, PENDING 등은 실패(X)로 간주하거나 빈칸
        // 벌금 조회용이므로 수행하지 않은 날은 X 처리 (시각적 효과)
        div.classList.add('fail');
        icon = ''; // 그냥 빈칸 혹은 X
      }

      div.innerHTML = `<div class="past-day-icon">${icon}</div><div class="past-day-text">${text}</div>`;
      grid.appendChild(div);
    });
  }

  // [수정] 계좌복사 함수 (checkAndPayFine 바로 아래에 두세요)
  function copyAccount(showMsg = true) {
    const text = "7942-19-81948";

    const handleCopy = () => {
      if (showMsg) showAlert('계좌번호가 복사되었습니다!');
    };

    // 최신 브라우저 방식 시도 후 실패시 구형 방식 사용
    if (navigator.clipboard) {
      navigator.clipboard.writeText(text).then(handleCopy).catch(() => {
        fallbackCopy(text, showMsg);
      });
    } else {
      fallbackCopy(text, showMsg);
    }
  }

  // [수정] 구형 기기 호환용 복사 함수
  function fallbackCopyText(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
        document.execCommand('copy');
        showAlert('복사되었습니다!');
    } catch (err) {
        showAlert('직접 복사해주세요.');
    }
    document.body.removeChild(textArea);
  }

  function linkify(text) {
    if (!text) return ""; // 텍스트가 없을 경우 에러 방지

    // 1. URL 링크 만들기
    var urlRegex = /(https?:\/\/[^\s]+)/g;
    var linkedText = text.replace(urlRegex, function(url) {
      return '<a href="' + url + '" target="_blank" style="color:#3182F6; text-decoration:underline; font-weight:700;">' + url + '</a>';
    });

    // 2. [핵심] 줄바꿈(\n)을 <br> 태그로 변환하여 리턴
    return linkedText.replace(/\n/g, '<br>');
  }

  // [추가] 관리자 뷰용 미니 그리드 생성기 (이번주/다음주 분리)
  function createAdminSplitGridHtml(selectedDates) {
    if (!selectedDates || selectedDates.length === 0) return '';

    // 1. 날짜들을 시간 순서대로 정렬 (오류 방지)
    const sortedDates = selectedDates.map(d => new Date(d)).sort((a, b) => a - b);

    // 2. 기준 월요일 잡기 (가장 빠른 신청 날짜가 속한 주의 월요일)
    // 이렇게 하면 관리자가 언제 접속하든 상관없이, 신청한 주간의 모양이 나옵니다.
    const firstDate = sortedDates[0];
    const day = firstDate.getDay();
    const diff = firstDate.getDate() - day + (day == 0 ? -6 : 1); // 월요일 계산

    const baseMon = new Date(firstDate);
    baseMon.setDate(diff);
    baseMon.setHours(0, 0, 0, 0);

    // 3. 주차별 분류 (신청한 주 / 그 다음 주)
    const week1Hits = []; // 신청 주간
    const week2Hits = []; // 신청 주간의 다음 주 (2주치 신청했을 경우)

    sortedDates.forEach(d => {
      d.setHours(0, 0, 0, 0);

      // 기준 월요일(baseMon)과 며칠 차이나는지 계산
      const timeDiff = d.getTime() - baseMon.getTime();
      const dayDiff = Math.floor(timeDiff / (1000 * 60 * 60 * 24));

      // 요일 인덱스 (0:월 ~ 6:일)
      const dayIdx = (d.getDay() + 6) % 7;

      if (dayDiff >= 0 && dayDiff < 7) {
        week1Hits.push(dayIdx); // 첫 번째 주
      } else if (dayDiff >= 7 && dayDiff < 14) {
        week2Hits.push(dayIdx); // 두 번째 주
      }
    });

    // 4. HTML 생성
    const days = ['월', '화', '수', '목', '금', '토', '일'];
    let html = '<div class="admin-exempt-wrapper">';

    // [첫 번째 그리드]
    html += '<div class="admin-week-label">신청 주간</div><div class="mini-grid-container">';
    days.forEach((d, i) => {
      const active = week1Hits.includes(i) ? 'active' : '';
      html += `<div class="mini-grid-cell ${active}">${d}</div>`;
    });
    html += '</div>';

    // [두 번째 그리드] - 만약 기간이 2주에 걸쳐있다면 표시
    if (week2Hits.length > 0) {
      html += '<div class="admin-week-label">다음 주간</div><div class="mini-grid-container">';
      days.forEach((d, i) => {
        const active = week2Hits.includes(i) ? 'active' : '';
        html += `<div class="mini-grid-cell ${active}">${d}</div>`;
      });
      html += '</div>';
    }

    html += '</div>';
    return html;
  }

  // [수정] 일괄 승인 실행 (디버깅 로그 추가)
  function submitBatchApprove() {
    // 1. 체크된 항목 수집
    const checkboxes = document.querySelectorAll('.review-chk:checked');
    console.log("선택된 체크박스 개수:", checkboxes.length); // 디버깅용

    if (checkboxes.length === 0) {
        return showAlert('선택된 항목이 없습니다.');
    }

    // 2. 데이터 파싱
    const items = [];
    checkboxes.forEach(chk => {
        const val = chk.value;
        if(val && val.includes('|')) {
            const parts = val.split('|');
            items.push({ row: parts[0], col: parts[1] });
        }
    });
    
    console.log("파싱된 아이템:", items); // 디버깅용

    if (items.length === 0) {
        return showAlert('유효한 선택 항목이 없습니다.');
    }

    // 3. 확인 창 띄우기
    showConfirm(
      `선택한 ${items.length}건을 일괄 승인하시겠습니까?\n\n⚠️ 사진을 꼼꼼히 확인하셨나요?`, 
      function() { // 화살표 함수 대신 일반 함수 사용 (호환성)
        showLoad('일괄 처리 중...');
        
        google.script.run
        .withSuccessHandler(function(res) {
            hideLoad(); // 로딩 끄기
            if (res.success) {
                showAlert(`${res.count}건 처리 완료!`);
                openAdminReview(); // 목록 새로고침
                loadDashboard();   // 대시보드 갱신
            } else {
                showAlert('실패: ' + res.msg);
            }
        })
        .withFailureHandler(function(err) {
             hideLoad();
             showAlert('서버 오류: ' + err);
        })
        .processVerificationBatch(currentUser, items); 
    });
  }

  // [5] 스텝 준비 (메뉴 제어 및 딜레이)
  function showStep() {
    const dataList = (currentTutoType === 'admin') ? adminTutoData : userTutoData;
    const data = dataList[tutoStep];

    const spot = document.getElementById('tutoSpot');
    const card = document.getElementById('tutoCard');

    const sidebar = document.getElementById('sideMenu');
    const isMenuOpen = sidebar.classList.contains('active');

    let delay = 100;

    if (data.reqMenu && !isMenuOpen) {
      openMenu();
      delay = 450;
    } else if (!data.reqMenu && isMenuOpen) {
      closeMenu();
      delay = 450;
    }

    setTimeout(() => {
      showStepReal(data, spot, card);
    }, delay);
  }

  // [6] 하이라이트 및 카드 표시
  function showStepReal(data, spot, card) {
    const dataList = (currentTutoType === 'admin') ? adminTutoData : userTutoData;

    document.getElementById('tutoTitle').innerText = data.title;
    document.getElementById('tutoText').innerText = data.msg;

    const nextBtn = document.querySelector('.tuto-next');
    // 마지막 단계면 버튼 텍스트를 '시작하기'로 변경
    if (tutoStep === dataList.length - 1) {
      nextBtn.innerText = "시작하기";
    } else {
      nextBtn.innerText = "다음 >";
    }

    card.classList.remove('show');

    if (data.target) {
      const targetEl = document.querySelector(data.target);

      if (targetEl) {
        targetEl.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });

        setTimeout(() => {
          const rect = targetEl.getBoundingClientRect();
          const padding = 10;

          spot.style.top = (rect.top - padding) + 'px';
          spot.style.left = (rect.left - padding) + 'px';
          spot.style.width = (rect.width + (padding * 2)) + 'px';
          spot.style.height = (rect.height + (padding * 2)) + 'px';
          spot.style.opacity = 1;

          let cardTop = rect.bottom + 20 + padding;
          if (cardTop + 200 > window.innerHeight) {
            cardTop = rect.top - 200 - padding;
          }
          if (cardTop < 20) cardTop = 20;

          card.style.top = cardTop + 'px';
          card.style.left = '50%';
          card.style.transform = 'translateX(-50%)';
          card.style.position = 'absolute';

          card.classList.add('show');
        }, 500);

      } else {
        showCenterCard(spot, card);
      }
    } else {
      showCenterCard(spot, card);
    }
  }

  function showCenterCard(spot, card) {
    spot.style.opacity = 0;
    card.style.top = '50%';
    card.style.left = '50%';
    card.style.transform = 'translate(-50%, -50%)';
    card.style.position = 'fixed';
    setTimeout(() => card.classList.add('show'), 100);
  }

  function doRegister() {
    const nick = document.getElementById('regNick').value;
    const pw = document.getElementById('regPw').value;
    const pwConfirm = document.getElementById('regPwConfirm').value;
    const question = document.getElementById('regQuestion').value;
    const answer = document.getElementById('regAnswer').value;

    if (!nick || !pw || !pwConfirm || !answer) return showAlert('모든 항목을 입력해주세요.');
    if (pw !== pwConfirm) return showAlert('비밀번호가 일치하지 않습니다.');

    const nickRegex = /^[가-힣a-zA-Z0-9]+$/;
    if (!nickRegex.test(nick)) {
      return showAlert('닉네임은 완성된 한글, 영문, 숫자만 가능합니다.\n(자음/모음/특수문자 사용 불가)');
    }

    showLoad('가입 처리 중...(15초 이내)');

    if (regProfileFile) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64Data = e.target.result;

  function openDaySheet() {
    const overlay = document.getElementById('sheetOverlay');
    const sheet = document.getElementById('daySheet');

    setTimeout(() => {
      overlay.classList.add('visible');
      sheet.classList.add('active');
    }, 10);

    // 1. 현재 선택된 값 가져오기
    const currentVal = document.getElementById('selectedDayValue').value;

    // 2. 비교를 위한 날짜 객체 준비
    const realToday = new Date();
    realToday.setHours(0, 0, 0, 0);

    // currentStartDateObj는 loadDashboard에서 설정된 '시스템상 이번 주 월요일'
    const systemMonDate = new Date(currentStartDateObj);
    
    // 현재 뷰가 'next'라면 기준일을 7일 뒤로 이동
    if (typeof showingWeek !== 'undefined' && showingWeek === 'next') {
      systemMonDate.setDate(systemMonDate.getDate() + 7);
    }

    // 3. 리스트 아이템 하나씩 검사
    const items = document.querySelectorAll('.sheet-item');
    items.forEach((item, index) => {
      // 초기화
      item.classList.remove('selected', 'disabled');

      // 해당 항목의 날짜 계산 (index 0=월요일 ... 6=일요일)
      // 주의: HTML의 sheet-item 순서가 월~일 순서여야 합니다.
      const itemDate = new Date(systemMonDate);
      itemDate.setDate(itemDate.getDate() + index);
      itemDate.setHours(0, 0, 0, 0);

      // [핵심 수정] "항목 날짜"가 "실제 오늘"보다 미래면 비활성화
      // 예: 오늘이 월요일이어도, 시스템이 지난주 일요일을 가리키면 일요일은 '과거'이므로 활성화됨
      if (itemDate > realToday) {
        item.classList.add('disabled');
      }

      // 현재 선택된 항목 표시 (비활성화 아닌 경우에만)
      if (!item.classList.contains('disabled') && item.innerText.startsWith(currentVal)) {
        item.classList.add('selected');
      }
    });
  }

  // 3. 요일 선택 (목록에서 클릭 or 캘린더에서 클릭)
  function selectDay(dayChar, fromCalendar = false) {
    const btn = document.getElementById('daySelectBtn');
    const valInput = document.getElementById('selectedDayValue');
    const textSpan = document.getElementById('daySelectText');
    const uploadBtn = document.getElementById('selectPhotoBtn'); // 업로드 버튼

    // 1. 값 및 텍스트 변경
    valInput.value = dayChar;
    textSpan.innerText = dayChar + "요일";

    // 2. 캘린더 UI 동기화 (목록에서 눌렀을 때 캘린더에도 표시)
    if (!fromCalendar) {
      closeDaySheet();
      const gridItems = document.querySelectorAll('.day-item');
      gridItems.forEach(item => {
        if (item.textContent.trim().startsWith(dayChar)) {
          item.classList.add('selected');
        } else {
          item.classList.remove('selected');
        }
      });
    }

    // 3. 버튼 펄스 애니메이션
    btn.classList.remove('anim-pulse');
    void btn.offsetWidth;
    btn.classList.add('anim-pulse');

    // ========== [핵심 수정] 버튼 활성화/비활성화 로직 (날짜 기준 비교) ==========

    // A. 비교를 위한 '실제 오늘 날짜' 객체 생성 (시간은 00:00:00으로 통일)
    const realToday = new Date();
    realToday.setHours(0, 0, 0, 0);

    // B. 선택한 요일이 '몇 월 며칠'인지 계산
    const dayMap = { '월': 0, '화': 1, '수': 2, '목': 3, '금': 4, '토': 5, '일': 6 };
    const selectedIdx = dayMap[dayChar];

    // showingWeek가 undefined일 경우 안전하게 'this'로 처리
    const currentView = (typeof showingWeek !== 'undefined') ? showingWeek : 'this';
    
    // currentStartDateObj는 loadDashboard에서 설정된 '시스템상 이번 주 월요일'입니다.
    let targetDate = new Date(currentStartDateObj);
    
    // 만약 '다음 주' 보기 상태라면 7일을 더함
    if (currentView === 'next') {
      targetDate.setDate(targetDate.getDate() + 7);
    }
    
    // 선택한 요일만큼 날짜를 더함
    targetDate.setDate(targetDate.getDate() + selectedIdx);
    targetDate.setHours(0, 0, 0, 0);

    // C. 데이터 가져오기 (이번 주 or 다음 주)
    const targetData = (currentView === 'next') ? nextWeekData : currentWeekData;
    const dayInfo = targetData[dayChar];

    // D. 버튼 상태 결정
    // "선택한 날짜(targetDate)"가 "오늘(realToday)"보다 확실히 미래인 경우에만 잠금
    // 예: 시스템은 1일~7일(일), 실제 오늘은 8일(월)인 경우
    // 사용자가 7일(일) 선택 -> targetDate(7일) < realToday(8일) -> 과거이므로 활성화됨 (OK)
    if (targetDate > realToday) {
      uploadBtn.classList.add('disabled');
      uploadBtn.innerText = "인증 불가";
      return; // 로직 종료
    }

    // E. 과거/오늘 날짜라면 -> 상태(DONE)에 따라 처리
    if (dayInfo && dayInfo.status === 'DONE') {
      uploadBtn.classList.add('disabled'); // 회색 처리
      uploadBtn.innerText = "✅ 이미 인증됨";
    } else {
      // 업로드 가능 상태
      uploadBtn.classList.remove('disabled');
      uploadBtn.innerText = "사진 업로드";

      // 상태별 텍스트 디테일
      if (dayInfo && dayInfo.status === 'PENDING') uploadBtn.innerText = "사진 교체하기";
      if (dayInfo && dayInfo.status === 'REJECT') uploadBtn.innerText = "재업로드 (반려됨)";
    }
  }

  function toggleTooltip(element) {
    // 1. 숨겨진 텍스트 가져오기
    const hiddenTextDiv = element.querySelector('.tooltip-bubble');
    if (!hiddenTextDiv) return;
    const msg = hiddenTextDiv.innerText.trim();

    // 2. 툴팁 요소 준비
    const globalBubble = document.getElementById('globalTooltip');
    globalBubble.innerText = msg;
    
    // 3. 툴팁을 일단 화면에 그려서 크기를 측정해야 함 (보이지 않게)
    globalBubble.style.opacity = '0';
    globalBubble.style.display = 'block';
    
    // 4. 좌표 계산
    const rect = element.getBoundingClientRect(); // 클릭한 아이템의 위치
    const bubbleRect = globalBubble.getBoundingClientRect(); // 툴팁의 크기
    
    const screenWidth = window.innerWidth;
    const margin = 10; // 화면 끝에서 띄울 간격

    // 기본 위치: 아이템의 정중앙
    let leftX = rect.left + (rect.width / 2) - (bubbleRect.width / 2);
    
    // [핵심] 화면 왼쪽 밖으로 나가면 보정
    if (leftX < margin) {
        leftX = margin;
    }
    // [핵심] 화면 오른쪽 밖으로 나가면 보정
    else if (leftX + bubbleRect.width > screenWidth - margin) {
        leftX = screenWidth - bubbleRect.width - margin;
    }

    // 높이 설정 (아이템 바로 위)
    let topY = rect.top - bubbleRect.height - 10; 
    // 혹시 위쪽 공간이 부족하면 아래로 띄우기
    if (topY < 10) {
        topY = rect.bottom + 10;
    }

    // 5. 최종 위치 적용 및 표시
    globalBubble.style.left = leftX + 'px';
    globalBubble.style.top = topY + 'px';
    globalBubble.classList.add('show');
    globalBubble.style.opacity = '1';

    // 6. 2.5초 뒤 자동 닫기
    if (tooltipTimeout) clearTimeout(tooltipTimeout);
    tooltipTimeout = setTimeout(() => {
        globalBubble.classList.remove('show');
        setTimeout(() => { globalBubble.style.display = 'none'; }, 200);
    }, 2500);
  }

  let calTouchStartX = 0;
  let calTouchStartY = 0;
  let menuTouchStartX = 0;
  let menuTouchStartY = 0;
  let challTouchStartX = 0;
  let challTouchStartY = 0;
  let isSwipeEnabled = false; // 중복 실행 방지 플래그

  function enableSwipeGestures() {
    if (isSwipeEnabled) return;
    isSwipeEnabled = true;

    // --- 1. 캘린더 영역 스와이프 (이번주 <-> 다음주) ---
    const calGrid = document.getElementById('calGrid');
    calGrid.addEventListener('touchstart', (e) => {
        calTouchStartX = e.changedTouches[0].screenX;
        calTouchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    calGrid.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].screenX;
        const endY = e.changedTouches[0].screenY;
        handleCalendarSwipe(calTouchStartX, endX, calTouchStartY, endY, e);
    }, { passive: true });

    // --- 2. 전체 화면 스와이프 (메뉴 열기/닫기) ---
    document.addEventListener('touchstart', (e) => {
        menuTouchStartX = e.changedTouches[0].screenX;
        menuTouchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].screenX;
        const endY = e.changedTouches[0].screenY;
        handleMenuSwipe(menuTouchStartX, endX, menuTouchStartY, endY, e);
    }, { passive: true });

    // --- 3. [신규] 챌린지 화면 뒤로가기 (왼쪽 가장자리 -> 오른쪽) ---
    const challengeScreen = document.getElementById('challengeScreen');
    
    challengeScreen.addEventListener('touchstart', (e) => {
        challTouchStartX = e.changedTouches[0].screenX;
        challTouchStartY = e.changedTouches[0].screenY;
    }, { passive: true });

    challengeScreen.addEventListener('touchend', (e) => {
        const endX = e.changedTouches[0].screenX;
        const endY = e.changedTouches[0].screenY;
        
        const diffX = endX - challTouchStartX; // 가로 이동 거리
        const diffY = endY - challTouchStartY; // 세로 이동 거리

        // [조건 1] 왼쪽 가장자리에서 시작했는가? (화면 왼쪽 15% 이내)
        const isEdgeStart = challTouchStartX < (window.innerWidth * 0.15); 
        
        // [조건 2] 오른쪽으로 충분히 당겼는가? (80px 이상)
        // [조건 3] 수직 이동은 적은가? (대각선 스와이프 방지)
        if (isEdgeStart && diffX > 80 && Math.abs(diffY) < 60) {
            closeChallengePage(); // 뒤로가기 실행!
        }
    }, { passive: true });
  }

  // 캘린더 스와이프 로직
  function handleCalendarSwipe(startX, endX, startY, endY, event) {
    const diffX = endX - startX;
    const diffY = endY - startY;

    if (Math.abs(diffY) > 50) return; // 수직 스크롤 무시

    if (Math.abs(diffX) > 60) {
      if (diffX < 0) toggleWeekView('next'); // 왼쪽으로 밀면 다음주
      else toggleWeekView('this'); // 오른쪽으로 밀면 이번주

      // 캘린더 스와이프가 메뉴 스와이프로 오해받지 않도록 이벤트 전파 중단 시도
      if (event.stopPropagation) event.stopPropagation();
    }
  }

  // 메뉴바 스와이프 로직
  function handleMenuSwipe(startX, endX, startY, endY, event) {
    const diffX = endX - startX;
    const diffY = endY - startY;
    const sidebar = document.getElementById('sideMenu');
    const screenWidth = window.innerWidth; // 화면 전체 너비

    // 수직 스크롤 중이면 무시
    if (Math.abs(diffY) > 60) return;

    // 1. 메뉴 닫기: 메뉴가 열려있을 때
    // 메뉴가 오른쪽에 있으므로, 닫으려면 오른쪽으로 밀어야 함 ( -> )
    if (sidebar.classList.contains('active')) {
      if (diffX > 60) {
        closeMenu();
      }
    }
    // 2. 메뉴 열기: 메뉴가 닫혀있을 때
    // 화면 오른쪽 끝에서 왼쪽으로 당겨야 함 ( <- )
    else {
      // 시작점이 화면 오른쪽 끝(오차 60px) 이내여야 함
      // 그리고 왼쪽으로 60px 이상 이동했는지 확인
      if (startX > (screenWidth - 60) && diffX < -60) {
        openMenu();
      }
    }
  }

  // [신규] 배지 HTML 생성 헬퍼 함수 (중복 제거용)
  function generateBadgeHtml(reactions) {
      if (!reactions) return "";
      let html = "";
      const emojiOrder = ['🔥', '💪', '🌶️']; 
      emojiOrder.forEach(emoji => {
          const count = reactions[emoji];
          if (count && count > 0) {
            html += `<span class="reaction-badge">${emoji} ${count}</span>`;
          }
      });
      return html;
  }

  function toggleShareBtn() {
    const btn = document.getElementById('shareToggleBtn');
    // const icon = document.getElementById('shareIcon'); // <--- 이 녀석이 범인이었습니다 (삭제함)
    const status = document.getElementById('shareStatus');
    const input = document.getElementById('isPublicValue');

    // 현재 상태 확인 (off 클래스가 없으면 공개 상태)
    // 버튼을 눌렀으니 상태를 반대로 뒤집어야 합니다.
    const isCurrentlyPublic = !btn.classList.contains('off');

    if (isCurrentlyPublic) {
      // [ON -> OFF] 끄기 (비공개)
      btn.classList.add('off');
      // icon.innerText = '🔒'; // 에러 유발 코드 삭제
      status.innerText = 'OFF';
      input.value = 'false'; // [중요] 여기가 실행되어야 서버에 비공개로 전달됩니다.
    } else {

  let bubbleInterval = null;

  // [신규] 무작위 말풍선 연기 효과 시작
  function startFloatingBubbles(photoList) {
    // 기존 타이머가 있다면 먼저 제거
    if (bubbleInterval) {
        clearInterval(bubbleInterval);
        bubbleInterval = null;
    }

    const galleryItems = document.querySelectorAll('.gallery-item');
    const validIndices = [];

    // 글 내용이 있는 사진만 후보군으로 등록
    photoList.forEach((data, idx) => {
      if (data.content && data.content.trim() !== "") {
        validIndices.push(idx);
      }
    });

    if (validIndices.length === 0 || galleryItems.length === 0) return;

    bubbleInterval = setInterval(() => {
      // ⭐⭐⭐ [핵심 수정] 대시보드가 화면에 안 보이면 즉시 중단 ⭐⭐⭐
      const dashboard = document.getElementById('dashboardScreen');
      if (!dashboard || dashboard.style.display === 'none') {
          return; // 아무것도 하지 않고 함수 종료
      }

      // 2. 랜덤 선택
      const targetIdx = validIndices[Math.floor(Math.random() * validIndices.length)];
      const targetItem = galleryItems[targetIdx];
      const photoData = photoList[targetIdx];

      if (!targetItem || !photoData) return;

      // 3. 위치 계산
      const rect = targetItem.getBoundingClientRect();

      // ⭐ [추가 안전장치] 높이/너비가 0이면(숨겨진 상태) 생성 안 함
      if (rect.width === 0 || rect.height === 0) return;

      // 화면 밖이면 생성 안 함
      if (rect.top < 0 || rect.bottom > window.innerHeight) return;

      const bubble = document.createElement('div');
      bubble.className = 'floating-bubble';

      const shortText = photoData.content.length > 20 ?
        photoData.content.substring(0, 20) + "..." :
        photoData.content;
      bubble.innerText = "💬 " + shortText;

      // 4. 위치 랜덤화
      const randomOffsetX = (Math.random() - 0.5) * (rect.width * 0.6);
      const randomOffsetY = (Math.random() - 0.5) * (rect.height * 0.4);

      const centerX = rect.left + (rect.width / 2) + randomOffsetX;
      const startY = rect.top + (rect.height / 2) + randomOffsetY;

      bubble.style.left = centerX + "px";
      bubble.style.top = startY + "px";

      document.body.appendChild(bubble);

      setTimeout(() => {
        if (bubble && bubble.parentNode) {
          bubble.parentNode.removeChild(bubble);
        }
      }, 3000);

    }, 1500); 
  }

  // [대폭 수정] 면제 표시 기능이 추가된 그리기 함수
  function drawChart(canvasId, type, labels, data, labelName, color, isFill, exemptions) {
    const ctx = document.getElementById(canvasId).getContext('2d');
    
    if (canvasId === 'workoutChartCanvas' && workoutChart) workoutChart.destroy();
    if (canvasId === 'fineChartCanvas' && fineChart) fineChart.destroy();

    // 그라데이션 (Line only)
    let bg = color;
    if (type === 'line') {
        let gradient = ctx.createLinearGradient(0, 0, 0, 250);
        gradient.addColorStop(0, color + '66'); 
        gradient.addColorStop(1, color + '00'); 
        bg = gradient;
    }

    // 기본 데이터셋
    const datasets = [{
        label: labelName,
        data: data,
        borderColor: color,
        backgroundColor: type === 'line' ? bg : color + 'CC',
        borderWidth: 2,
        pointBackgroundColor: '#fff',
        pointBorderColor: color,
        pointRadius: 6,
        pointHoverRadius: 9,
        pointHitRadius: 25,
        fill: isFill,
        tension: 0.3,
        borderRadius: 6,
        order: 2
    }];

    // [핵심] 벌금 그래프이고, 면제 데이터가 있다면 -> '별 마커' 데이터셋 추가
    if (type === 'bar' && exemptions) {
        // 면제인 날은 500원 위치에, 아닌 날은 null
        const starData = exemptions.map(ex => ex ? 500 : null);
        
        datasets.push({
            type: 'line', // 마커를 찍기 위해 선 그래프 형식 사용 (선은 숨김)
            label: '면제',
            data: starData,
            borderColor: '#FFD700', // 금색
            backgroundColor: '#FFD700',
            pointStyle: 'star',     // 별 모양
            pointRadius: 8,         // 별 크기 키움
            pointHoverRadius: 10,
            showLine: false,        // 선은 안 그림
            order: 1                // 막대보다 위에 그림
        });
    }

    const config = {
      type: type,
      data: {
        labels: labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: {
            duration: 1500,
            easing: 'easeOutQuart'
        },
        scales: {
          y: {
            beginAtZero: true,
            // 벌금 그래프면 면제 별(500위치)이 잘 보이게 최소 높이 확보
            suggestedMax: type === 'line' ? 5 : 6000, 
            grid: { color: '#F2F4F6' },
            ticks: { 
                color: color, 
                font: {family: 'Pretendard', weight: 'bold'},
                stepSize: (type === 'bar') ? undefined : 1,
                callback: function(value) {
                    if (type === 'bar') return value >= 1000 ? (value/1000) + 'k' : value;
                    if (value % 1 !== 0) return null;
                    return value;
                }
            }
          },
          x: {
            grid: { display: false },
            ticks: { font: {size: 11}, maxRotation: 45, minRotation: 45 }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(0,0,0,0.9)',
            padding: 14,
            cornerRadius: 12,
            displayColors: false,
            callbacks: {
              label: function(context) {
                // 면제 마커 툴팁
                if (context.dataset.label === '면제') {
                    return '⭐ 벌금 면제됨';
                }
                
                // 기존 데이터 툴팁
                const val = context.parsed.y;
                if (type === 'bar') {
                    // 벌금 0원인데 면제 마커가 없는 경우 (완벽하게 수행한 날)
                    if (val === 0) return '🎉 완벽 수행 (0원)';
                    return `💸 ${val.toLocaleString()}원`;
                }
                return `🔥 ${val}회`;
              }
            }
          }
        }
      }
    };

    if (canvasId === 'workoutChartCanvas') workoutChart = new Chart(ctx, config);
    else fineChart = new Chart(ctx, config);
  }

  function animateCounter(id, endValue, duration) {
    const element = document.getElementById(id);
    const startValue = 0;
    const startTime = performance.now();

    // 목표값이 0이면 애니메이션 없이 바로 0 표시
    if (endValue === 0) {
      element.innerText = 0;
      return;
    }

    function update(currentTime) {
      const elapsed = currentTime - startTime;
      const progress = Math.min(elapsed / duration, 1);

      // Ease-out 효과 (처음엔 빠르고 끝에 느려짐)
      // 수식: 1 - pow(1 - progress, 3) -> Cubic Ease Out
      const ease = 1 - Math.pow(1 - progress, 3);

      const current = Math.floor(startValue + (endValue - startValue) * ease);
      element.innerText = current;

      if (progress < 1) {
        requestAnimationFrame(update);
      } else {
        element.innerText = endValue; // 최종 값 보정
      }
    }

    requestAnimationFrame(update);
  }

  let reactionQueue = {}; // 누른 횟수 모아두는 곳 { '🔥': 3, '💪': 1 ... }
  let reactionTimer = null; // 타이머

  // [수정됨] 리액션 버튼 클릭 함수 (Optimistic UI + Debouncing)
  function sendEmoji(emoji) {
    const postNick = document.getElementById('gDetailNick').innerText;
    const dayText = document.getElementById('gDetailDay').innerText;
    const day = dayText.substring(0, 1);

    // 1. 모달 내부 숫자 업데이트 (기존 코드)
    const idMap = { '🔥': 'count-fire', '💪': 'count-muscle', '🌶️': 'count-pepper' };
    const targetId = idMap[emoji];
    const countEl = document.getElementById(targetId);
    
    if (countEl) {
        let currentVal = parseInt(countEl.innerText) || 0;
        countEl.innerText = currentVal + 1;
        
        countEl.style.transform = "scale(1.5)";
        countEl.style.transition = "transform 0.2s";
        setTimeout(() => countEl.style.transform = "scale(1)", 200);
    }

    // 2. ★ [핵심 추가] 갤러리 썸네일(목록) 데이터 및 UI 즉시 업데이트
    if (currentPhotoIndex !== -1 && allGalleryPhotos[currentPhotoIndex]) {
        // (1) 전역 데이터 수정
        const photoData = allGalleryPhotos[currentPhotoIndex];
        if (!photoData.reactions) photoData.reactions = {};
        
        // 해당 이모지 카운트 증가
        photoData.reactions[emoji] = (photoData.reactions[emoji] || 0) + 1;

        // (2) 썸네일 배지 영역 다시 그리기
        const badgeContainer = document.getElementById(`badges-${currentPhotoIndex}`);
        if (badgeContainer) {
            badgeContainer.innerHTML = generateBadgeHtml(photoData.reactions);
        }
    }

    // 3. 서버 전송 큐 (기존 코드)
    const key = `${postNick}|${day}|${emoji}`; 
    if (!reactionQueue[key]) reactionQueue[key] = 0;
    reactionQueue[key]++;

    if (reactionTimer) clearTimeout(reactionTimer);
    reactionTimer = setTimeout(() => {
        sendBatchReactions(); 
    }, 800);
  }

  // [신규] 모아둔 리액션을 서버로 전송
  function sendBatchReactions() {
    // 큐 복사 후 초기화 (전송 중 새로 들어오는 것과 섞이지 않게)
    const dataToSend = { ...reactionQueue };
    reactionQueue = {}; 

    if (Object.keys(dataToSend).length === 0) return;

    // 서버로 전송
    google.script.run.withSuccessHandler(res => {
        // 성공 시 아무것도 안 함 (이미 숫자는 올라가 있음)
        // 실패 시에만 롤백하거나 알림 (여기선 생략)
    }).addReactionBatch(dataToSend, currentUser);
  }

  function typeWriter(element, text, speed = 30) {
    let i = 0;
    function type() {
      if (i < text.length) {
        // charAt(i)가 '\n'일 때 CSS의 pre-wrap 덕분에 자동으로 줄바꿈이 됩니다.
        element.textContent += text.charAt(i);
        i++;
        // 타이핑할 때마다 스크롤을 아래로 밀어줌
        document.getElementById('aiChatList').scrollTop = document.getElementById('aiChatList').scrollHeight;
        setTimeout(type, speed);
      }
    }
    type();
  }

  // [수정] 챌린지 목록 불러오기 (종료됨 분류 추가 + 클릭 이벤트)
  function loadChallengeList() {
    showLoad('챌린지 목록 불러오는 중...');
    
    google.script.run.withSuccessHandler(list => {
      hideLoad();
      const activeContainer = document.getElementById('activeChallengeList');
      const otherContainer = document.getElementById('otherChallengeList');
      const endedContainer = document.getElementById('endedChallengeList');
      
      const sectionTitle = activeContainer.previousElementSibling;
      
      activeContainer.innerHTML = '';
      otherContainer.innerHTML = '';
      if(endedContainer) endedContainer.innerHTML = '';

      if (list.length === 0) {
        activeContainer.innerHTML = '<div style="text-align:center; color:#888;">등록된 챌린지가 없습니다.</div>';
        return;
      }

      const hasActive = list.some(item => item.status === '진행중');
      let promotedTitle = null; 

      if (!hasActive) {
          const firstUpcoming = list.find(item => item.status === '예정');
          if (firstUpcoming) {
              promotedTitle = firstUpcoming.title;
              if(sectionTitle) sectionTitle.innerText = "🚀 곧 시작되는 챌린지";
          } else {
              if(sectionTitle) sectionTitle.innerText = "🔥 진행 중인 챌린지";
          }
      } else {
          if(sectionTitle) sectionTitle.innerText = "🔥 진행 중인 챌린지";
      }

      list.forEach(item => {
        let cardClass = 'challenge-card';
        let badgeStyle = ''; // 기본 스타일
        let targetDiv = otherContainer; 
        
        // 이미지 프리로딩
        if (item.img) {
             const preloadImg = new Image();
             preloadImg.src = item.img;
        }

        let bgStyle = '';
        if (item.img) {
            bgStyle = `background-image: url('${item.img}');`;
            cardClass += ' has-img';
        }

        let statusDisplay = ''; 
        
        const isPromoted = (promotedTitle && item.title === promotedTitle);

        // 1. 상태별 로직 (진행중, 종료, 예정)
        if (item.status === '진행중') {
            cardClass += ' active'; 
            targetDiv = activeContainer; 
            statusDisplay = `<span class="d-day-badge">${item.dDay}</span>`;
            
        } else if (item.status === '종료') {
            // 종료는 회색 배경에 진한 회색 글씨
            badgeStyle = 'background:#E5E8EB; color:#8B95A1;';
            if(endedContainer) targetDiv = endedContainer;
            
        } else if (item.status === '예정') {
            // ⭐ [수정됨] 예정도 회색 배경에 진한 회색 글씨로 변경
            badgeStyle = 'background:#F2F4F6; color:#8B95A1;';
        }

        // 2. 메인으로 승격된 '예정' 챌린지 처리
        if (isPromoted) {
            cardClass += ' active'; // 배경은 화려하게
            targetDiv = activeContainer; // 위치는 위로
            // 텍스트만 띄우기 (Coming Soon)
            statusDisplay = `<span style="color:white; font-weight:800; font-size:14px; text-shadow: 0 1px 4px rgba(0,0,0,0.5);">Coming Soon</span>`;
        }


        // 특수문자 방어
        const clean = (str) => {
            if (!str) return "";
            return String(str).replace(/\\/g, "/").replace(/"/g, "&quot;").replace(/'/g, "\\'").replace(/[\r\n]+/g, " ");
        };
        const cleanDesc = (str) => {
            if (!str) return "";
            return String(str).replace(/\\/g, "/").replace(/"/g, "&quot;").replace(/'/g, "\\'").replace(/[\r\n]+/g, "<br>");
        };

        const safeTitle = clean(item.title);
        const safePeriod = clean(item.period);     // 화면 표시용 (02.15 등)
        const safeRawPeriod = clean(item.rawPeriod); // [핵심] 계산용 원본 (2026.02.15)
        const safeDesc = cleanDesc(item.desc);
        const safeReward = clean(item.reward);
        const safeImg = clean(item.img);
        const safeTarget = item.target || 0;
        
        const html = `
            <div class="${cardClass}" style="${bgStyle}" onclick="openChallengeDetail('${safeTitle}', '${safePeriod}', '${safeDesc}', '${safeReward}', '${item.status}', '${safeImg}', ${safeTarget}, '${safeRawPeriod}')">
              <div class="c-header">
                <span class="c-badge" style="${badgeStyle}">${item.status}</span>
                ${statusDisplay}
              </div>
              <div class="c-title">${item.title}</div>
              <div class="c-period">${item.period}</div>
              <div class="c-reward">
                <span>🎁</span> <span>${item.reward}</span>
              </div>
            </div>
        `;
        targetDiv.innerHTML += html;
      });

    }).getChallengeData();
  }

        else if (status === '예정') header.style.background = '#3182F6';

    google.script.run.withSuccessHandler(res => {

  function enablePullToRefresh() {
    const spinner = document.getElementById('ptr-spinner');
    const icon = document.getElementById('ptr-icon');
    
    let startY = 0;
    let isPulling = false;
    let isRefreshing = false;
    let pullDistance = 0; 

    // 1. 터치 시작
    window.addEventListener('touchstart', (e) => {
      // ⭐ [핵심 추가] 예외 처리: 메뉴나 모달, 바텀시트 내부 터치 시 무시 ⭐
      const target = e.target;

      // A. 사이드 메뉴가 열려있고, 터치가 메뉴(Sidebar) 내부라면 -> 무시
      const sideMenu = document.getElementById('sideMenu');
      if (sideMenu && sideMenu.classList.contains('active') && sideMenu.contains(target)) {
          return; 
      }

      // B. 열려있는 모달(.modal-card)이나 오버레이 내부라면 -> 무시
      if (target.closest('.modal-card') || target.closest('.modal-overlay')) {
          return;
      }

      // C. 바텀 시트(요일 선택 등) 내부라면 -> 무시
      if (target.closest('.bottom-sheet')) {
          return;
      }
      
      // 👇👇👇 새로고침 방지 추가 (리포트 화면) 👇👇👇
      if (target.closest('#recapScreen')) {
          return;
      }

      // 스크롤이 맨 위이고, 현재 새로고침 중이 아닐 때만 시작
      if (window.scrollY === 0 && !isRefreshing) {
        startY = e.touches[0].clientY;
        isPulling = true;
        pullDistance = 0;
        
        // 애니메이션 초기화
        spinner.style.transition = 'none'; 
      }
    }, { passive: true });

    // 2. 당기는 중
    window.addEventListener('touchmove', (e) => {
      if (!isPulling) return;
      
      const currentY = e.touches[0].clientY;
      const diff = currentY - startY;

      // 아래로 당길 때만 작동
      if (diff > 0) {
        // 저항감(0.4)을 줘서 쫀쫀하게
        const move = Math.min(diff * 0.4, 120); 
        pullDistance = move; 

        spinner.style.top = (move - 60) + 'px'; 
        
        // 회전 애니메이션 (충분히 당겼을 때)
        if (move > 60) {
            icon.style.transform = 'rotate(180deg)';
            icon.innerText = '⬆️'; 
        } else {
            icon.style.transform = 'rotate(0deg)';
            icon.innerText = '⬇️';
        }
      } else {
        // 위로 스크롤하면 취소
        isPulling = false;
        pullDistance = 0;
      }
    }, { passive: true });

    // 3. 터치 끝
    window.addEventListener('touchend', (e) => {
      if (!isPulling) return;
      isPulling = false; 

      if (pullDistance > 60) { 
        // 새로고침 실행 상태로 변경
        isRefreshing = true;
        
        // 놓는 순간에는 부드럽게 제자리로 가야 하므로 애니메이션 킴
        spinner.style.transition = 'top 0.2s';
        spinner.style.top = '20px'; 
        
        icon.innerText = '⏳'; 
        icon.style.animation = 'spin 1s infinite linear';

  function setupSortable(elementId, storageKey) {
    const grid = document.getElementById(elementId);
    if (!grid) return;

    // 1. 저장된 순서 불러오기
    const savedOrder = localStorage.getItem(storageKey);
    if (savedOrder) {
        try {
            const order = JSON.parse(savedOrder);
            
            // ⭐ [추가] 저장된 목록에 없는 '새로운 메뉴'들만 따로 모아둡니다.
            const unsavedItems = [];
            grid.querySelectorAll('.menu-box').forEach(el => {
                if (!order.includes(el.getAttribute('data-id'))) {
                    unsavedItems.push(el);
                }
            });

            // 기존 메뉴들을 저장된 순서대로 재배치
            order.forEach(id => {
                const item = grid.querySelector(`[data-id="${id}"]`);
                if (item) grid.appendChild(item);
            });
            
            // ⭐ [추가] 새로운 메뉴는 무조건 맨 끝에 이어 붙여줍니다!
            unsavedItems.forEach(item => grid.appendChild(item));

        } catch(e) {}
    }

    // 2. 드래그 활성화
    new Sortable(grid, {
        animation: 300,
        delay: 200,
        delayOnTouchOnly: true, 
        ghostClass: 'sortable-ghost',
        onEnd: function (evt) {
            const newOrder = [];
            grid.querySelectorAll('.menu-box').forEach(el => {
                newOrder.push(el.getAttribute('data-id'));
            });
            localStorage.setItem(storageKey, JSON.stringify(newOrder));
        },
    });
  }

  function copyToClipboard(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
            showAlert('복사되었습니다!');
        }).catch(() => {
            fallbackCopyText(text);
        });
    } else {
        fallbackCopyText(text);
    }
  }

  // 구형 방식 (화면 밖 안 보이는 곳에 입력창 만들어서 복사)
  function fallbackCopyText(text) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    
    // 화면 밖으로 숨김
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    
    try {
        document.execCommand('copy');
        showAlert('계좌번호가 복사되었습니다!');
    } catch (err) {
        showAlert('복사에 실패했습니다. 직접 입력해주세요.');
    }
    
    document.body.removeChild(textArea);
  }

    });

      const div = document.createElement('div');
      // 스타일: 높이 20px, 가로 100% 꽉 차게
      div.style.cssText = "height: 20px; display: flex; align-items: center; gap: 6px; width: 100%; max-width: 100%;";
      
      let innerHTML = "";

      if (item.isDefault) {
         // [A] 기본 문구일 때 (회색)
         innerHTML = `<span class="cheer-text-item" style="color:#8B95A1;">${item.msg}</span>`;

         let imgTag = '';
         if(item.profileUrl) {
             imgTag = `<img src="${item.profileUrl}" style="width:16px; height:16px; border-radius:50%; object-fit:cover; flex-shrink:0;" referrerpolicy="no-referrer">`;
         } else {
             imgTag = `<span style="font-size:12px; flex-shrink:0;">👤</span>`;
         }
         
         // 텍스트 색상 적용 (기본값 #333333이면 다크모드 대응 변수 사용)
         const rawColor = item.color || "#333333";
         const finalColor = (rawColor === "#333333") ? "var(--text-main)" : rawColor;

         // 닉네임과 내용 표시
         innerHTML = `${imgTag} 
                      <span style="font-weight:700; font-size:13px; color:var(--text-main); flex-shrink:0;">${item.nickname}</span> 
                      <span class="cheer-text-item" style="color:${finalColor}; font-weight:600;">${item.msg}</span>`;
      }
      
      div.innerHTML = innerHTML;
      wrapper.appendChild(div);
    });

    // 4. 롤링 애니메이션 로직
    if (rollingList.length > 1) {
       const firstClone = wrapper.children[0].cloneNode(true);
       wrapper.appendChild(firstClone);

       let idx = 0;
       
       if (cheerInterval) clearInterval(cheerInterval);
       
       cheerInterval = setInterval(() => {
          idx++;
          wrapper.style.transition = "transform 0.5s cubic-bezier(0.16, 1, 0.3, 1)";
          wrapper.style.transform = `translateY(-${idx * 20}px)`; 

          if (idx === rollingList.length) {
             setTimeout(() => {
                wrapper.style.transition = "none"; 
                wrapper.style.transform = "translateY(0)"; 
                idx = 0;
             }, 500); 
          }
       }, 2500); 
    }
  }

          if(item.period) {

      photoIndex++;

      const rot = (Math.random() * 12 - 6).toFixed(1); 
      
      return `

        html += `

  // 스크롤 시 씬(Scene)이 활성화되는 로직
  function setupRecapAnimations() {
    const sections = document.querySelectorAll('.recap-section');
    const finalCard = document.getElementById('finalCard');
    
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        // 씬이 화면의 50% 이상 보일 때 visible 클래스 추가
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          // 마지막 카드 특별 애니메이션
          if(entry.target.contains(finalCard)) {
              finalCard.style.opacity = 1;
              finalCard.style.transform = 'translateY(0)';
          }
        }
      });
    }, { threshold: 0.5 }); // 화면에 50% 걸치면 실행되게 하여 몰입감 상승

    sections.forEach(sec => observer.observe(sec));
  }

  function openMenuAddModal() {
    closeMenu();
    document.getElementById('menuAddModal').style.display = 'flex';
  }

  // [신규] 모달 내 개별 스위치 동작 제어 (확장형)
  function executeMenuToggle(menuType, switchEl) {
    // 1. 확인(Confirm)을 누르기 전까지는 스위치가 움직이지 않게 시각적 상태 되돌림
    const isChecking = switchEl.checked;
    switchEl.checked = !isChecking; 

    // 2. 확인 창 띄우기
    showConfirm(`해당 메뉴를 ${isChecking ? '공개(활성화)' : '숨김(비활성화)'} 하시겠습니까?`, () => {
      showLoad('상태 변경 중...');
      
      // 메뉴 타입이 'recap(결산)'일 경우의 처리
      if (menuType === 'recap') {
        google.script.run.withSuccessHandler(res => {
          hideLoad();
          if (res.success) {
            // 서버 응답 성공 시 스위치 상태를 최종 적용
            switchEl.checked = res.isVisible; 
            showAlert(res.isVisible ? "메뉴가 회원들에게 공개되었습니다! 🎉" : "메뉴가 숨김 처리되었습니다. 🔒");
            loadDashboard(); // 메인 화면 메뉴 즉시 갱신
          } else {
            showAlert('실패: ' + res.msg);
          }
        }).toggleRecapVisibility(currentUser);
      }
      
      // 추후에 다른 메뉴가 추가되면 여기에 if (menuType === 'new_event') { ... } 형태로 이어서 작성하시면 됩니다.
    });
  }
</script>
